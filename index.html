<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Deepali 🎉</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

/* VIDEO (BOTTOM) */
video {
  position: fixed;
  width: 100%;
  height: 75%;
  bottom: 0;
  object-fit: cover;
}

/* GIFT */
#gift {
  position: absolute;
  width: 120px;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%) scale(0);
  transition: 1s;
}

/* TEXT (TOP LEFT) */
#text {
  position: absolute;
  top: 20px;
  left: 15px;
  color: #ff4dff;
  font-size: 18px;
  font-weight: bold;
  max-width: 60%;
  opacity: 0;
  text-shadow: 0 0 10px black;
}

/* PHOTO (TOP RIGHT) */
#photo {
  position: absolute;
  top: 20px;
  right: 15px;
  width: 130px;
  border-radius: 15px;
  opacity: 0;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="bgVideo" autoplay muted>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- MUSIC -->
<audio id="music" src="song.m4a"></audio>

<!-- GIFT -->
<img src="gift.png" id="gift">

<!-- TEXT -->
<div id="text">
Happy Birthday Miss Deepali 🎉<br><br>
Aaj ka din sirf aapka hai...<br><br>
Aap hamesha khush rahein, safe rahein ❤️<br><br>
Kabhi kabhi life simple nahi hoti,<br>
par aap strong hain 💫<br><br>
Ye meri taraf se last wish hai…
</div>

<!-- PHOTO -->
<img src="deepali.jpg" id="photo">

<script>
const video = document.getElementById("bgVideo");
const gift = document.getElementById("gift");
const text = document.getElementById("text");
const photo = document.getElementById("photo");
const music = document.getElementById("music");

// 🔊 music start on tap (mobile rule)
document.body.addEventListener("click", () => {
  music.play();
}, { once: true });

// 🎁 16 sec event
video.addEventListener("timeupdate", () => {
  if (video.currentTime >= 16) {

    // gift show
    gift.style.transform = "translate(-50%, -50%) scale(1)";

    setTimeout(() => {

      // gift remove
      gift.style.display = "none";

      // show text + photo
      text.style.opacity = 1;
      photo.style.opacity = 1;

    }, 1500);
  }
});
</script>

</body>
</html>
