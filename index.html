<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Deepali 🎉</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

/* VIDEO */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* GIFT BOX */
#gift {
  position: absolute;
  width: 120px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(0);
  transition: 1s;
}

/* TEXT */
#text {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  font-size: 18px;
  max-width: 60%;
  opacity: 0;
}

/* PHOTO */
#photo {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 120px;
  border-radius: 10px;
  opacity: 0;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="bgVideo" autoplay muted>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- GIFT -->
<img src="gift.png" id="gift">

<!-- TEXT -->
<div id="text">
Happy Birthday Miss Deepali 🎉<br><br>
Aaj ka din sirf aapka hai...<br><br>
Aap hamesha khush rahein, safe rahein ❤️<br><br>
Ye meri taraf se last wish hai…
</div>

<!-- PHOTO -->
<img src="deepali.jpg" id="photo">

<script>
const video = document.getElementById("bgVideo");
const gift = document.getElementById("gift");
const text = document.getElementById("text");
const photo = document.getElementById("photo");

// 🎯 16 SECOND PE ACTION
video.addEventListener("timeupdate", () => {
  if (video.currentTime >= 16) {

    // Gift show
    gift.style.transform = "translate(-50%, -50%) scale(1)";

    setTimeout(() => {
      gift.style.transform = "translate(-50%, -50%) scale(0)";

      // Text show (top left)
      text.style.opacity = 1;

      // Photo show (top right)
      photo.style.opacity = 1;

    }, 1500);
  }
});
</script>

</body>
</html>
